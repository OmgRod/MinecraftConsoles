name: Pull Request 3DS Build

on:
  workflow_dispatch: 
  pull_request:
    types: [opened, reopened, synchronize]
    paths-ignore:
      - '.gitignore'
      - '*.md'
      - '.github/*.md'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Verify 3DS toolchain
      shell: pwsh
      run: |
        $devkitPro = if ($env:DEVKITPRO) { $env:DEVKITPRO } else { 'C:\devkitPro' }
        $required = @(
          Join-Path $devkitPro 'devkitARM\bin\arm-none-eabi-g++.exe',
          Join-Path $devkitPro 'tools\bin\3dsxtool.exe',
          Join-Path $devkitPro 'tools\bin\smdhtool.exe',
          'C:\tools\makerom.exe'
        )
        foreach ($tool in $required) {
          if (!(Test-Path $tool)) {
            throw "Missing required 3DS tool: $tool. Install devkitPro (devkitARM + 3ds-dev + 3dstools) and makerom before running this workflow."
          }
        }

    - name: Build 3DS title
      shell: cmd
      run: build-3ds.bat

    - name: Package artifacts
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path staging | Out-Null
        Copy-Item .\build\3ds\Minecraft.Client\Debug\Minecraft3DS.cia staging/
        Copy-Item .\build\3ds\Minecraft.Client\Debug\Minecraft3DS.3ds staging/
        Copy-Item .\build\3ds\Minecraft.Client\Debug\Minecraft3DS.3dsx staging/
        Copy-Item .\build\3ds\Minecraft3DS.ncch staging/

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-3DS
        path: staging/*
