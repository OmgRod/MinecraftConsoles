name: Nightly 3DS Release

on:
  workflow_dispatch: 
  push:
    branches:
    - 'main'
    paths-ignore:
      - '.gitignore'
      - '*.md'
      - '.github/**'
      - '!.github/workflows/nightly.yml'

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      DEVKITPRO: C:\devkitPro
      DEVKITARM: C:\devkitPro\devkitARM

    strategy:
      matrix:
        platform: [3DS]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install devkitPro toolchain
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

        $installerUrl = 'https://github.com/devkitPro/installer/releases/download/v3.0.3/devkitProUpdater-3.0.3.exe'
        $installerPath = Join-Path $env:RUNNER_TEMP 'devkitProUpdater-3.0.3.exe'

        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
        Start-Process -FilePath $installerPath -ArgumentList '/S', '/D=C:\devkitPro' -Wait -NoNewWindow

        $pacman = Join-Path $env:DEVKITPRO 'msys2\usr\bin\pacman.exe'
        & $pacman -Sy --noconfirm --needed 3ds-dev 3ds-portlibs
        if ($LASTEXITCODE -ne 0) {
          throw "pacman failed with exit code $LASTEXITCODE"
        }

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Verify 3DS toolchain
      shell: pwsh
      run: |
        $devkitPro = $env:DEVKITPRO
        $required = @(
          Join-Path $devkitPro 'devkitARM\bin\arm-none-eabi-g++.exe',
          Join-Path $devkitPro 'tools\bin\3dsxtool.exe',
          Join-Path $devkitPro 'tools\bin\smdhtool.exe',
          Join-Path $devkitPro 'tools\bin\makerom.exe'
        )
        foreach ($tool in $required) {
          if (!(Test-Path $tool)) {
            throw "Missing required 3DS tool: $tool. The devkitPro install step did not complete successfully."
          }
        }

    - name: Build 3DS title
      shell: cmd
      run: build-3ds.bat

    - name: Zip Build
      shell: pwsh
      run: |
        7z a -r LCE${{ matrix.platform }}.zip `
          .\build\3ds\Minecraft.Client\Debug\Minecraft3DS.cia `
          .\build\3ds\Minecraft.Client\Debug\Minecraft3DS.3ds `
          .\build\3ds\Minecraft.Client\Debug\Minecraft3DS.3dsx `
          .\build\3ds\Minecraft3DS.ncch

    - name: Stage artifacts
      run: |
        New-Item -ItemType Directory -Force -Path staging
        Copy-Item LCE${{ matrix.platform }}.zip staging/

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-${{ matrix.platform }}
        path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts
        merge-multiple: true

    - name: Update release
      uses: andelf/nightly-release@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: nightly
        name: Nightly 3DS Release
        body: |
          Install the CIA on a real 3DS or use the .3ds image in an emulator.
          
          # 🚨 First time here? 🚨
          If you've never downloaded the game before, you need to download `LCE3DS.zip` and extract it somewhere convenient. The archive contains the CIA, 3DS, 3DSX, and NCCH outputs.
        files: |
          artifacts/*

  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Cleanup artifacts
      uses: geekyeggo/delete-artifact@v5
      with:
        name: build-*
